    <body>
        <h3 class="section-title">SHA-384 Generator</h3>
        <div class="container">
            <textarea id="inputText" placeholder="변환할 값을 입력하세요..."></textarea>
            <div class="result-box" id="result">여기에 해시값이 표시됩니다.</div>
            <div class="controls">
                <button class="btn-clear" onclick="clearText()">지우기</button>
                <button class="btn-copy" onclick="copyHash()">복사하기</button>
            </div>
        </div>
        <h3 class="section-title">Archive Open-Key List</h3>
        <table>
            <thead>
                <tr>
                    <th style="width: 30%;">계정</th>
                    <th style="width: 70%;">공개키</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
        <script src="open-key.js"></script>
